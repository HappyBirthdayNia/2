<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style> body{
  background-color: #050000;
  font-family: Signika Negative, Asap, sans-serif;
  color:white;
  overflow:hidden;
}

/* Romantic red glow in the middle */
#glow {
  position: absolute;
  left: 50%;
  top: 50%;
width: min(187.2vmin, 1872px);
height: min(187.2vmin, 1872px);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(
    circle at center,
    rgba(115, 0, 25, 0.18) 0%,
    rgba(115, 0, 25, 0.10) 22%,
    rgba(75, 0, 15, 0.06) 42%,
    rgba(55, 0, 10, 0.03) 60%,
    rgba(0, 0, 0, 0) 72%
  );
  filter: blur(10px) saturate(160%);
  animation: glowPulse 3.6s ease-in-out infinite;
}

#glow::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    circle at center,
    rgba(95, 0, 20, 0.22) 0%,
    rgba(95, 0, 20, 0.0) 62%
  );
  filter: blur(22px);
  opacity: 0.9;
}

@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(0.98); opacity: 0.95; }
  50% { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
}

.dot{
  width:35px;
  height:35px;
  position:absolute;
  background: url(https://image.ibb.co/kyUHab/rose.png);
  background-size: 100% 100%;
  z-index: 0;
}
html, body, #container {width:100%; height:100%; }
#logo{ left:50%; top:50%; position:absolute; border-radius:10px; }



</style>
</head>
<body>
    
<div id="glow"></div>
<div id="container">

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>

<script>/*
a Pen by DIACO : twitter.com/Diaco_ml  ||  codepen.io/MAW
powered by GSAP : https://www.greensock.com/
*/
TweenLite.set("#container",{perspective:600})
TweenLite.set("img",{xPercent:"-50%",yPercent:"-50%"})

var total = 30;
var warp = document.getElementById("container"),	w = window.innerWidth , h = window.innerHeight;
 
 for (i=0; i<total; i++){ 
   var Div = document.createElement('div');
   TweenLite.set(Div,{attr:{class:'dot'},x:R(0,w),y:R(-200,-150),z:R(-200,200)});
   warp.appendChild(Div);
   animm(Div);
 }
 
 function animm(elm){   
   TweenMax.to(elm,R(6,15),{y:h+100,ease:Linear.easeNone,repeat:-1,delay:-15});
   TweenMax.to(elm,R(4,8),{x:'+=100',rotationZ:R(0,180),repeat:-1,yoyo:true,ease:Sine.easeInOut});
   TweenMax.to(elm,R(2,8),{rotationX:R(0,360),rotationY:R(0,360),repeat:-1,yoyo:true,ease:Sine.easeInOut,delay:-5});
 };

function R(min,max) {return min+Math.random()*(max-min)};


// a Pen by DIACO : twitter.com/Diaco_ml  ||  codepen.io/MAW</script>
</body>
</html>
